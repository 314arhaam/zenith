name: build_and_release

on:
  push:
    tags:
      - "v*"

jobs:
  build_and_upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            server_bin: zenith_server-linux-amd64
            client_bin: zenith_client-linux-amd64
          - os: windows-latest
            goos: windows
            server_bin: zenith_server-windows-amd64.exe
            client_bin: zenith_client-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            server_bin: zenith_server-darwin-amd64
            client_bin: zenith_client-darwin-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: build server
        shell: bash
        run: |
          GOOS='${{ matrix.goos }}' GOARCH='amd64' CGO_ENABLED=0 go build -o '${{ matrix.server_bin }}' server/main.go

      - name: build client
        shell: bash
        run: |
          GOOS='${{ matrix.goos }}' GOARCH='amd64' CGO_ENABLED=0 go build -o '${{ matrix.client_bin }}' client/main.go

      - name: upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server_bin }}
          path: ${{ matrix.server_bin }}
          if-no-files-found: error

      - name: upload client binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client_bin }}
          path: ${{ matrix.client_bin }}
          if-no-files-found: error

  create_release_and_upload_assets:
    needs: build_and_upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: create release
        id: create_release
        uses: actions/create-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: upload linux server
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/zenith_server-linux-amd64/zenith_server-linux-amd64
          asset_name: zenith_server-linux-amd64
          asset_content_type: application/octet-stream

      - name: upload linux client
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/zenith_client-linux-amd64/zenith_client-linux-amd64
          asset_name: zenith_client-linux-amd64
          asset_content_type: application/octet-stream

      - name: upload macos server
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/zenith_server-darwin-amd64/zenith_server-darwin-amd64
          asset_name: zenith_server-darwin-amd64
          asset_content_type: application/octet-stream

      - name: upload macos client
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/zenith_client-darwin-amd64/zenith_client-darwin-amd64
          asset_name: zenith_client-darwin-amd64
          asset_content_type: application/octet-stream

      - name: upload windows server
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/zenith_server-windows-amd64.exe/zenith_server-windows-amd64.exe
          asset_name: zenith_server-windows-amd64.exe
          asset_content_type: application/vnd.microsoft.portable-executable

      - name: upload windows client
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/zenith_client-windows-amd64.exe/zenith_client-windows-amd64.exe
          asset_name: zenith_client-windows-amd64.exe
          asset_content_type: application/vnd.microsoft.portable-executable